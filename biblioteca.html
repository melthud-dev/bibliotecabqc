<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biblioteca Virtual – BQC</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Segoe UI', Arial, sans-serif;
  background: #f7f5ee;
  color: #111;
  min-height: 100vh;
}

/* TOPBAR */
.topbar {
  background: #29491a;
  color: white;
  padding: 0 2rem;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}

.logo {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  font-size: 0.88rem;
  font-weight: 700;
  color: white;
}

.logo-icon {
  width: 32px; height: 32px;
  background: #ecc600;
  border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1rem;
}

.user-area { display: flex; align-items: center; gap: 0.75rem; }

.user-chip {
  display: flex; align-items: center; gap: 0.5rem;
  font-size: 0.8rem;
  color: rgba(255,255,255,0.8);
}

.avatar {
  width: 30px; height: 30px;
  border-radius: 50%;
  background: #ecc600;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.72rem;
  font-weight: 700;
  color: #111;
}

.btn-salir {
  background: transparent;
  border: 1px solid rgba(255,255,255,0.25);
  color: rgba(255,255,255,0.8);
  padding: 0.3rem 0.85rem;
  border-radius: 6px;
  cursor: pointer;
  font-size: 0.78rem;
  font-family: 'Segoe UI', Arial, sans-serif;
  transition: background 0.15s;
}

.btn-salir:hover { background: rgba(255,255,255,0.1); }

/* BANNER */
.banner {
  background: linear-gradient(135deg, #29491a 0%, #3f6f28 100%);
  color: white;
  padding: 1.75rem 2rem;
  border-bottom: 3px solid #ecc600;
}

.banner h1 { font-size: 1.35rem; font-weight: 800; margin-bottom: 0.2rem; }

.banner-sub {
  font-size: 0.82rem;
  color: rgba(255,255,255,0.65);
  margin-bottom: 1rem;
}

.search-wrap {
  position: relative;
  max-width: 460px;
}

.search-wrap input {
  width: 100%;
  padding: 0.65rem 1rem 0.65rem 2.4rem;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 9px;
  color: white;
  font-size: 0.88rem;
  outline: none;
  font-family: 'Segoe UI', Arial, sans-serif;
  transition: border-color 0.2s;
}

.search-wrap input::placeholder { color: rgba(255,255,255,0.45); }

.search-wrap input:focus { border-color: rgba(236,198,0,0.75); }

.search-icon {
  position: absolute;
  left: 0.7rem; top: 50%;
  transform: translateY(-50%);
  color: rgba(255,255,255,0.5);
  font-size: 0.95rem;
  pointer-events: none;
}

/* PESTAÑAS CARRERAS */
.tabs {
  background: white;
  border-bottom: 1px solid #e9e7dc;
  display: flex;
  overflow-x: auto;
  scrollbar-width: none;
  padding: 0 2rem;
}

.tabs::-webkit-scrollbar { display: none; }

.tab {
  padding: 0.85rem 1.25rem;
  font-size: 0.83rem;
  font-weight: 600;
  color: #777;
  cursor: pointer;
  border-bottom: 3px solid transparent;
  white-space: nowrap;
  transition: color 0.15s, border-color 0.15s;
  user-select: none;
}

.tab:hover { color: #29491a; }

.tab.active {
  color: #29491a;
  border-bottom-color: #ecc600;
}

/* CONTENIDO */
.content {
  max-width: 1280px;
  margin: 0 auto;
  padding: 1.5rem 2rem 3rem;
}

/* SECCIÓN MATERIA */
.materia-sec { margin-bottom: 2rem; }

.materia-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 0.75rem;
  padding-left: 0.625rem;
  border-left: 3px solid #ecc600;
  font-size: 0.9rem;
  font-weight: 700;
  color: #29491a;
}

.materia-cnt {
  font-size: 0.7rem;
  background: #e9e7dc;
  color: #777;
  padding: 0.12rem 0.5rem;
  border-radius: 10px;
  font-weight: 500;
}

/* GRID LIBROS */
.books-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
  gap: 0.875rem;
}

.book-card {
  background: white;
  border: 1px solid #e9e7dc;
  border-radius: 10px;
  padding: 1rem;
  display: flex;
  flex-direction: column;
  gap: 0.45rem;
  transition: box-shadow 0.15s, border-color 0.15s;
}

.book-card:hover {
  box-shadow: 0 3px 16px rgba(0,0,0,0.08);
  border-color: #c8c5b8;
}

.book-tag {
  display: inline-block;
  font-size: 0.68rem;
  font-weight: 600;
  padding: 0.12rem 0.5rem;
  border-radius: 4px;
  margin-bottom: 0.1rem;
}

.book-title {
  font-size: 0.88rem;
  font-weight: 700;
  color: #111;
  line-height: 1.3;
}

.book-author {
  font-size: 0.75rem;
  color: #777;
}

.book-desc {
  font-size: 0.76rem;
  color: #555;
  line-height: 1.5;
  flex: 1;
}

.book-meta {
  display: flex;
  gap: 0.4rem;
  flex-wrap: wrap;
  margin-top: 0.1rem;
}

.badge {
  font-size: 0.67rem;
  font-weight: 600;
  padding: 0.1rem 0.45rem;
  border-radius: 4px;
}

.badge-year {
  background: rgba(79,130,55,0.14);
  color: #29491a;
}

.badge-pdf {
  background: rgba(236,198,0,0.18);
  color: #111;
}

.badge-link {
  background: #e9e7dc;
  color: #3f6f28;
}

.btn-acceder {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 0.5rem 0.9rem;
  background: #3f6f28;
  color: white;
  border: none;
  border-radius: 7px;
  font-size: 0.8rem;
  font-weight: 600;
  cursor: pointer;
  font-family: 'Segoe UI', Arial, sans-serif;
  margin-top: auto;
  transition: background 0.15s;
}

.btn-acceder:hover { background: #29491a; }

/* VACÍO */
.empty-msg {
  text-align: center;
  padding: 4rem 2rem;
  color: #777;
}

.empty-msg .ico { font-size: 3rem; margin-bottom: 0.75rem; }

.empty-msg p { font-size: 0.88rem; }

/* MODAL PDF */
.modal-bg {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.72);
  z-index: 500;
  align-items: center;
  justify-content: center;
  padding: 1rem;
}

.modal-bg.abierto { display: flex; }

.modal-pdf {
  background: white;
  border-radius: 12px;
  width: 100%; max-width: 900px;
  height: 88vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.modal-pdf-head {
  background: #29491a;
  color: white;
  padding: 0.8rem 1.25rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}

.modal-pdf-head h3 {
  font-size: 0.88rem;
  font-weight: 700;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  max-width: 82%;
}

.btn-cerrar-modal {
  background: transparent;
  border: none;
  color: white;
  font-size: 1.35rem;
  cursor: pointer;
  line-height: 1;
  padding: 0 0.2rem;
}

.modal-pdf iframe {
  flex: 1;
  border: none;
  width: 100%;
}

@media (max-width: 600px) {
  .topbar, .banner, .content, .tabs { padding-left: 1rem; padding-right: 1rem; }
  .books-grid { grid-template-columns: 1fr; }
  .banner h1 { font-size: 1.1rem; }
}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="logo">
    <div class="logo-icon">&#128218;</div>
    Biblioteca Virtual &ndash; BQC
  </div>
  <div class="user-area">
    <div class="user-chip">
      <div class="avatar" id="avatarEl">?</div>
      <span id="nameEl">...</span>
    </div>
    <button class="btn-salir" onclick="cerrarSesion()">Salir</button>
  </div>
</div>

<!-- BANNER -->
<div class="banner">
  <h1>Recursos Bibliogr&aacute;ficos</h1>
  <div class="banner-sub" id="bannerSub">Selecciona tu carrera para ver los libros.</div>
  <div class="search-wrap">
    <span class="search-icon">&#128269;</span>
    <input type="text" id="buscador" placeholder="Buscar libro, autor o materia..." oninput="renderLibros()">
  </div>
</div>

<!-- TABS -->
<div class="tabs" id="tabsEl"></div>

<!-- CONTENIDO -->
<div class="content" id="contentEl">
  <div class="empty-msg">
    <div class="ico">&#128218;</div>
    <p>Selecciona una carrera para ver los libros disponibles.</p>
  </div>
</div>

<!-- MODAL PDF -->
<div class="modal-bg" id="modalBg" onclick="cerrarPdfExt(event)">
  <div class="modal-pdf">
    <div class="modal-pdf-head">
      <h3 id="modalTitulo">Visor de PDF</h3>
      <button class="btn-cerrar-modal" onclick="cerrarPdf()">&#10005;</button>
    </div>
    <iframe id="pdfFrame" src=""></iframe>
  </div>
</div>

<script>
var carreraActiva = null;

function cerrarSesion() {
  sessionStorage.removeItem('bv_session');
  window.location.href = 'index.html';
}

function getSession() {
  var s = sessionStorage.getItem('bv_session');
  if (!s) { window.location.href = 'index.html'; return null; }
  return JSON.parse(s);
}

function colorCarrera(id) {
  var carreras = JSON.parse(localStorage.getItem('bv_carreras') || '[]');
  for (var i = 0; i < carreras.length; i++) {
    if (carreras[i].id === id) return carreras[i].color;
  }
  return '#888';
}

function renderTabs() {
  var carreras = JSON.parse(localStorage.getItem('bv_carreras') || '[]');
  var el = document.getElementById('tabsEl');
  el.innerHTML = '';
  carreras.forEach(function(c, i) {
    var t = document.createElement('div');
    t.className = 'tab' + (i === 0 ? ' active' : '');
    t.innerHTML = c.icono + ' ' + c.nombre;
    (function(carrera, tabEl) {
      tabEl.onclick = function() {
        document.querySelectorAll('.tab').forEach(function(x){ x.classList.remove('active'); });
        tabEl.classList.add('active');
        carreraActiva = carrera.id;
        document.getElementById('bannerSub').textContent = 'Carrera: ' + carrera.nombre;
        renderLibros();
      };
    })(c, t);
    el.appendChild(t);
    if (i === 0) {
      carreraActiva = c.id;
      document.getElementById('bannerSub').textContent = 'Carrera: ' + c.nombre;
    }
  });
}

function renderLibros() {
  var libros   = JSON.parse(localStorage.getItem('bv_libros') || '[]');
  var buscador = document.getElementById('buscador').value.toLowerCase().trim();
  var content  = document.getElementById('contentEl');

  var filtrados = libros.filter(function(l) {
    var enCarrera = (l.carreraId === carreraActiva);
    var enBusq    = !buscador ||
      l.titulo.toLowerCase().indexOf(buscador) > -1 ||
      l.autor.toLowerCase().indexOf(buscador)  > -1 ||
      l.materia.toLowerCase().indexOf(buscador) > -1;
    return enCarrera && enBusq;
  });

  if (filtrados.length === 0) {
    content.innerHTML = '<div class="empty-msg"><div class="ico">&#128214;</div><p>No hay libros para esta b&uacute;squeda.</p></div>';
    return;
  }

  // Agrupar por materia
  var grupos = {};
  filtrados.forEach(function(l) {
    if (!grupos[l.materia]) grupos[l.materia] = [];
    grupos[l.materia].push(l);
  });

  content.innerHTML = '';
  var color = colorCarrera(carreraActiva);

  for (var mat in grupos) {
    var sec = document.createElement('div');
    sec.className = 'materia-sec';

    var head = document.createElement('div');
    head.className = 'materia-head';
    head.style.borderLeftColor = color;
    head.innerHTML = mat + ' <span class="materia-cnt">' + grupos[mat].length + ' recurso' + (grupos[mat].length > 1 ? 's' : '') + '</span>';
    sec.appendChild(head);

    var grid = document.createElement('div');
    grid.className = 'books-grid';

    grupos[mat].forEach(function(libro) {
      var card = document.createElement('div');
      card.className = 'book-card';

      var tipoBadge = libro.tipo === 'pdf'
        ? '<span class="badge badge-pdf">PDF</span>'
        : '<span class="badge badge-link">Enlace</span>';

      card.innerHTML =
        '<span class="book-tag" style="background:' + color + '22;color:' + color + '">' + mat.split(' ')[0] + '</span>' +
        '<div class="book-title">' + libro.titulo + '</div>' +
        '<div class="book-author">' + libro.autor + '</div>' +
        '<div class="book-desc">' + libro.descripcion + '</div>' +
        '<div class="book-meta"><span class="badge badge-year">' + libro.anio + '</span>' + tipoBadge + '</div>';

      var btn = document.createElement('button');
      btn.className = 'btn-acceder';
      btn.innerHTML = libro.tipo === 'pdf' ? '&#128196; Ver PDF' : '&#128279; Acceder al recurso';
      (function(b) {
        btn.onclick = function() { abrirRecurso(b); };
      })(libro);
      card.appendChild(btn);
      grid.appendChild(card);
    });

    sec.appendChild(grid);
    content.appendChild(sec);
  }
}

function abrirRecurso(libro) {
  if (libro.tipo === 'pdf') {
    document.getElementById('modalTitulo').textContent = libro.titulo;
    /* Base64 data URI o URL externa: ambos funcionan en iframe */
    document.getElementById('pdfFrame').src = libro.recurso;
    document.getElementById('modalBg').classList.add('abierto');
  } else {
    window.open(libro.recurso, '_blank');
  }
}

function cerrarPdf() {
  document.getElementById('modalBg').classList.remove('abierto');
  document.getElementById('pdfFrame').src = '';
}
function cerrarPdfExt(e) {
  if (e.target === document.getElementById('modalBg')) cerrarPdf();
}

// INICIO
var session = getSession();
if (session) {
  var partes = session.name.split(' ');
  var iniciales = '';
  partes.forEach(function(p) { if (p.length > 0) iniciales += p[0].toUpperCase(); });
  document.getElementById('avatarEl').textContent = iniciales.slice(0, 2);
  document.getElementById('nameEl').textContent   = session.name;
}
renderTabs();
renderLibros();
</script>
</body>
</html>
